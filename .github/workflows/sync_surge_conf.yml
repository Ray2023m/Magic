name: Periodic Sync Folder

on:
  schedule:

    - cron: '0 0 * * *'
  workflow_dispatch: # 允许你手动点击按钮触发测试

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出当前仓库（用于存放同步过来的文件夹）
      - name: Checkout target repo
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. 检出公共仓库的特定文件夹 (Sparse Checkout)
      - name: Checkout public repo folder
        uses: actions/checkout@v6
        with:
          repository: 'Rabbit-Spec/Surge' # 公共仓库地址
          path: 'temp-sync'                  # 临时存放路径
          sparse-checkout: |                 # 指定需要的文件夹路径
            Master/Conf/Spec
          sparse-checkout-cone-mode: false

      # 3. 将同步到的内容移动到目标位置并清理
      - name: Sync and cleanup
        run: |
          # 创建存放目录（如果不存在）
          mkdir -p Magic/Surge/
          # 将内容拷贝到指定目录（根据需求调整路径）
          cp -R temp-sync/Master/Conf/Spec/. ./Magic/Surge/
          rm -rf temp-sync

      # 4. 提交更改回你的仓库
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@://github.com"
          git add .
          # 只有在有变动时才提交
          if ! git diff-index --quiet HEAD; then
            git commit -m "Auto-sync: updated folder from public repo"
            git push
          else
            echo "No changes detected, skipping commit."
          fi
