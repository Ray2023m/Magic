name: Periodic Sync Folder

on:
  schedule:
    - cron: '0 0 * * *' # 每天北京时间 08:00 运行
  workflow_dispatch: 

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4 # 建议使用 v4，v6 目前尚未发布

      - name: Checkout public repo folder
        uses: actions/checkout@v4
        with:
          repository: 'Rabbit-Spec/Surge'
          ref: 'Master'         # 这里指定分支名
          path: 'temp-sync'
          sparse-checkout: |    # 路径从仓库根目录开始，不要带 Master/
            Conf/Spec
          sparse-checkout-cone-mode: false

      - name: Sync and cleanup
        run: |
          mkdir -p Magic/Surge/
          # 修正拷贝路径：从 temp-sync/Conf/Spec/ 拷贝
          cp -R temp-sync/Conf/Spec/. ./Magic/Surge/
          rm -rf temp-sync

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if ! git diff-index --quiet HEAD; then
            git commit -m "Auto-sync: updated folder from Rabbit-Spec/Surge"
            git push
          else
            echo "No changes detected, skipping commit."
          fi
