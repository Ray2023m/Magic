name: Sync MetaCubeX DAT -> Custom Rulesets

on:
  workflow_dispatch:
    inputs:
      include_tags:
        description: "Only keep these tags (comma-separated), e.g. Claude,OpenAI,Google"
        required: false
        type: string
      exclude_tags:
        description: "Remove these tags (comma-separated), e.g. ads,tracker"
        required: false
        type: string
  schedule:
    - cron: "30 23 * * *"   
  push:
    paths:
      - ".github/workflows/sync_meta-rules-dat_geomrs.yaml"
      - "scripts/sync_loy_geo_mrs.sh"
      - "scripts/helpers.py"
      - "Manual_Rules/**/*.yaml"
      - "trigger"

permissions:
  contents: write

concurrency:
  group: repo-geo-writer
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      # 预设白名单：提前把常用 tag 写在这里（逗号分隔）
      # 示例：Claude,OpenAI,Google,Netflix,YouTube
      PRESET_INCLUDE_TAGS: >
        cn,gfw,geolocation-!cn,private,github-copilot.mrs,
        openai,google,microsoft,github,apple,tiktok,
        netflix,youtube,disney,spotify,bilibili,hbo,
        facebook,instagram,x,telegram,line,nintendo,
        steam,epicgames,whatsapp
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      # ── Go 工具链（v2dat） ────────────────────────────────────────────────
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "stable"
          cache: false

      - name: Install v2dat
        run: |
          set -eux
          go install github.com/urlesistiana/v2dat@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
          v2dat -h || true

      # ── mihomo（mrs 编译） ────────────────────────────────────────────────
      - name: Install mihomo
        run: |
          set -eux
          MIHOMO_VERSION="$(curl -fsSL \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/MetaCubeX/mihomo/releases/latest \
            | grep '"tag_name"' | sed 's/.*"v\([^"]*\)".*/\1/')"

          if [ -z "$MIHOMO_VERSION" ]; then
            echo "::error::Failed to fetch mihomo version"
            exit 1
          fi

          echo "mihomo version: $MIHOMO_VERSION"
          ARCH="amd64"
          URL_TGZ="https://github.com/MetaCubeX/mihomo/releases/download/v${MIHOMO_VERSION}/mihomo-linux-${ARCH}-v${MIHOMO_VERSION}.tar.gz"
          URL_GZ="https://github.com/MetaCubeX/mihomo/releases/download/v${MIHOMO_VERSION}/mihomo-linux-${ARCH}-v${MIHOMO_VERSION}.gz"

          if curl -fL --retry 3 --retry-delay 2 "$URL_TGZ" -o mihomo.tar.gz 2>/dev/null; then
            tar -xzf mihomo.tar.gz
            BIN="$(find . -maxdepth 3 -type f -name mihomo | head -n 1)"
            [ -f "$BIN" ] && mkdir -p .tools && cp -f "$BIN" ./.tools/mihomo
          else
            curl -fL --retry 3 --retry-delay 2 "$URL_GZ" -o mihomo.gz
            mkdir -p .tools
            gunzip -c mihomo.gz > ./.tools/mihomo
          fi
          chmod +x ./.tools/mihomo
          ./.tools/mihomo -v

      # ── 同步分支到最新 ────────────────────────────────────────────────────
      - name: Sync branch (pre-run)
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -eux
          BRANCH="${DEFAULT_BRANCH:-main}"
          git fetch origin "${BRANCH}"
          git rebase "origin/${BRANCH}"

      # ── 执行脚本 ─────────────────────────────────────────────────────────
      - name: Run sync script
        env:
          MIHOMO_BIN: ./.tools/mihomo
        run: |
          set -eux
          chmod +x scripts/sync_loy_geo_mrs.sh
          scripts/sync_loy_geo_mrs.sh

      - name: Filter output by tags
        env:
          PRESET_INCLUDE_TAGS: ${{ env.PRESET_INCLUDE_TAGS }}
          INCLUDE_TAGS: ${{ github.event.inputs.include_tags || '' }}
          EXCLUDE_TAGS: ${{ github.event.inputs.exclude_tags || '' }}
        run: |
          set -euo pipefail

          COMBINED_INCLUDE="${PRESET_INCLUDE_TAGS}"
          if [ -n "$INCLUDE_TAGS" ]; then
            if [ -n "$COMBINED_INCLUDE" ]; then
              COMBINED_INCLUDE="${COMBINED_INCLUDE},${INCLUDE_TAGS}"
            else
              COMBINED_INCLUDE="$INCLUDE_TAGS"
            fi
          fi

          echo "preset_include_tags=${PRESET_INCLUDE_TAGS}"
          echo "input_include_tags=${INCLUDE_TAGS}"
          echo "combined_include_tags=${COMBINED_INCLUDE}"
          echo "include_tags=${INCLUDE_TAGS}"
          echo "exclude_tags=${EXCLUDE_TAGS}"

          declare -A include_set=()
          declare -A exclude_set=()

          while IFS= read -r tag; do
            include_set["$tag"]=1
          done < <(printf '%s' "$COMBINED_INCLUDE" | tr ',;' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | awk 'NF')

          # 自动包含手动规则目录里的 tag（按 *.yaml 文件名识别）
          while IFS= read -r tag; do
            include_set["$tag"]=1
          done < <(
            for d in Manual_Rules Manual_site Manual_Site Manual_ip Manual_IP; do
              [ -d "$d" ] || continue
              find "$d" -maxdepth 1 -type f -name '*.yaml' -print
            done | sed 's#^.*/##;s#\.yaml$##' | awk 'NF' | sort -u
          )

          while IFS= read -r tag; do
            exclude_set["$tag"]=1
          done < <(printf '%s' "$EXCLUDE_TAGS" | tr ',;' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | awk 'NF')

          include_count="${#include_set[@]}"
          remove_count=0
          keep_count=0

          while IFS= read -r f; do
            base="$(basename "$f")"
            tag="${base%.*}"
            keep=1

            if [ "$include_count" -gt 0 ] && [ -z "${include_set[$tag]+x}" ]; then
              keep=0
            fi

            if [ -n "${exclude_set[$tag]+x}" ]; then
              keep=0
            fi

            if [ "$keep" -eq 1 ]; then
              keep_count=$((keep_count + 1))
            else
              rm -f "$f"
              remove_count=$((remove_count + 1))
            fi
          done < <(find Rules/mihomo/geosite Rules/mihomo/geoip -type f \( -name '*.mrs' -o -name '*.list' \) 2>/dev/null | sort)

          echo "filter result: kept=${keep_count} removed=${remove_count}"

      # ── 调试输出 ─────────────────────────────────────────────────────────
      - name: Show outputs (debug)
        run: |
          set -eux
          echo "=== Rules/mihomo/geosite/ ===" && ls Rules/mihomo/geosite/ | head -10 || true
          echo "=== Rules/mihomo/geoip/ ===" && ls Rules/mihomo/geoip/ | head -10 || true
          echo "geosite mrs  : $(find Rules/mihomo/geosite -name '*.mrs'  | wc -l)"
          echo "geosite list : $(find Rules/mihomo/geosite -name '*.list' | wc -l)"
          echo "geoip   mrs  : $(find Rules/mihomo/geoip   -name '*.mrs'  | wc -l)"
          git status --porcelain || true

          echo "=== douyin IP debug ==="
          grep -c "IP-CIDR" Rules/mihomo/geosite/douyin.list || true
          grep -c "IP-ASN"  Rules/mihomo/geosite/douyin.list || true

      # ── Commit & Push（stash 重试版） ─────────────────────────────────────
      - name: Commit & push (safe)
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -eux
          BRANCH="${DEFAULT_BRANCH:-main}"

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          add_paths=(Rules/mihomo/geosite Rules/mihomo/geoip)
          [ -e geo ] && add_paths+=(geo)
          [ -e mihomo ] && add_paths+=(mihomo)
          git add -A "${add_paths[@]}"

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Auto Update Ruleset $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S %Z')"

          for i in 1 2 3 4 5; do
            if git push origin "HEAD:${BRANCH}"; then
              echo "Push success."; exit 0
            fi

            echo "Push rejected (race). retry=${i}"
            git stash push -u -m "actions-autostash" || true
            git fetch origin "${BRANCH}"
            git rebase "origin/${BRANCH}"
            git stash pop || true

            add_paths=(Rules/mihomo/geosite Rules/mihomo/geoip)
            [ -e geo ] && add_paths+=(geo)
            [ -e mihomo ] && add_paths+=(mihomo)
            git add -A "${add_paths[@]}"

            if git diff --name-only --diff-filter=U | grep -q .; then
              echo "Conflict after rebase. Aborting."
              git status --porcelain || true
              exit 1
            fi

            sleep $((i*2))
          done

          echo "Failed to push after retries."
          exit 1
