name: Sync Meta Rules

on:
  schedule:
    - cron: '30 7 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    # 核心：必须声明写权限，公共仓库才能自动推送更新
    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          # 公共仓库建议直接使用默认 TOKEN，无需手动配置 Secret
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download MRS Files
        run: |
          # 1. 改回你要求的路径结构
          mkdir -p Rules/Meta/geosite Rules/Meta/geoip
          
          # 2. 基础下载链接
          BASE_URL="https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo"

          geosite_list=(
            "openai" "perplexity" "github" "telegram" "x" "facebook" 
            "amazon" "apple-cn" "apple" "microsoft" "okx" "bybit" 
            "binance" "tiktok" "netflix" "disney" "hbo" "spotify" 
            "steam" "cn" "private" "reddit" "youtube" "google"
          )

          geoip_list=("telegram" "netflix" "cn" "google" "ad")

          # 3. 执行下载并保存到 Rules/Meta/
          for file in "${geosite_list[@]}"; do
            echo "Downloading geosite/$file.mrs..."
            curl -sSfL "${BASE_URL}/geosite/${file}.mrs" -o "Rules/Meta/geosite/${file}.mrs"
          done

          for file in "${geoip_list[@]}"; do
            echo "Downloading geoip/$file.mrs..."
            curl -sSfL "${BASE_URL}/geoip/${file}.mrs" -o "Rules/Meta/geoip/${file}.mrs"
          done

      - name: Commit and Push
        run: |
          # 1. 配置官方机器人身份
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@://github.com"
          
          # 2. 暂存所有规则目录下的改动
          git add Rules/
          
          # 3. 只有当检测到文件内容有变化时才执行提交和推送
          if git diff --cached --exit-code --quiet; then
            echo "No changes detected in rules, skipping commit."
          else
            echo "Changes detected, pushing updates..."
            git commit -m "Sync: Update rules $(date +'%Y-%m-%d') (Auto-check)"
            git push
          fi
