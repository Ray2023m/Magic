# ========================
# 中国联通DNS.旁路由
# ========================

dns:
  nameserver:
   - 116.116.116.116
   - 221.5.88.88

proxy-providers:
  provider:
    type: http
    url: "url"
    path: ./proxy_provider/provider.yaml
    proxy: DIRECT
    header:
      User-Agent:
      - clash.meta
    health-check:
      enable: true
      interval: 600
      url: https://cp.cloudflare.com/generate_204
    override:
      skip-cert-verify: true
      udp: true

proxies:
  - {name: 直连, type: direct}
  - {name: 拒绝, type: reject}

# ========================
# 策略组定义
# ========================
default: &default
  type: select
  proxies:
    - 香港-故转
    - 台湾-故转
    - 日本-故转
    - 狮城-故转
    - 韩国-故转
    - 美国-故转
    - 英国-故转
    - 其他-故转
    - 所有-智选
    - 所有-手选

default2: &default2
  type: select
  proxies:
    - 直连
    - 拒绝

default3: &default3
  type: select
  proxies:
    - 美国-故转
    - 香港-故转
    - 台湾-故转
    - 日本-故转
    - 狮城-故转
    - 韩国-故转
    - 英国-故转
    - 所有-智选
    - 所有-手选
default4: &default4
  type: select
  proxies:
    - 直连
    - 美国-故转
    - 香港-故转
    - 台湾-故转
    - 日本-故转
    - 狮城-故转
    - 韩国-故转
    - 英国-故转
    - 所有-智选
    - 所有-手选
    - 拒绝
default5: &default5
  type: select
  proxies:
    - 直连
    - 拒绝

proxy-groups:

  # 业务分流组

  - {name: ChatGPT, <<: *default3}
  - {name: Gemini, <<: *default3}
  - {name: Copilot, <<: *default3}
  - {name: Perplexity, <<: *default3}
  - {name: Claude, <<: *default3}
  - {name: Meta AI, <<: *default3}
  - {name: GitHub, <<: *default3}
  - {name: Reddit, <<: *default}
  - {name: Telegram, <<: *default}
  - {name: WhatsApp, <<: *default}
  - {name: Facebook, <<: *default}
  - {name: YouTube, <<: *default}
  - {name: TikTok, <<: *default}
  - {name: Netflix, <<: *default}
  - {name: HBO, <<: *default}
  - {name: Disney, <<: *default}
  - {name: Amazon, <<: *default}
  - {name: Crunchyroll, <<: *default}
  - {name: Spotify, <<: *default}
  - {name: Nvidia, <<: *default3}
  - {name: Steam, <<: *default4}
  - {name: Games, <<: *default4}
  - {name: Crypto, <<: *default}
  - {name: Apple, <<: *default4}
  - {name: Google, <<: *default}
  - {name: Microsoft, <<: *default4}
  - {name: Test, <<: *default}
  - {name: Block, <<: *default5}
  - {name: 国外, <<: *default}
  - {name: 国内, <<: *default2}
  - {name: 其他, <<: *default3}

  # 所有组

  - name: 所有-手选
    type: select
    include-all: true
    filter: "^((?!(直连|拒绝)).)*$"
    use:
      - provider
  - name: 所有-智选
    type: smart
    include-all: true
    policy-priority: "香港:1.2;牛逼:0.8"
    uselightgbm: true
    collectdata: true
    interval: 300
    filter: "^((?!(直连|拒绝)).)*$"
    use:
      - provider
  # 香港组

  - name: 香港-故转
    type: fallback
    interval: 300
    lazy: false
    proxies:
      - 香港-手选
      - 香港-智选
  
  - name: 香港-手选
    type: select
    include-all: true
    filter: "(?=.*(广港|香港|HK|Hong Kong|🇭🇰|HongKong)).*$"
    use:
      - provider   
  - name: 香港-智选
    type: smart
    include-all: true
    policy-priority: "provider:0.8"
    uselightgbm: true
    collectdata: true
    interval: 300
    filter: "(?=.*(广港|香港|HK|Hong Kong|🇭🇰|HongKong)).*$"
    use:
      - provider 
  # 台湾组

  - name: 台湾-故转
    type: fallback
