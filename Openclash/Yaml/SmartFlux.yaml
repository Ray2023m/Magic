# ====================锚点配置 ====================
# 订阅源基础配置
BaseProvider: &BaseProvider {type: http, interval: 86400, proxy: DIRECT, health-check: {enable: true, url: 'https://cp.cloudflare.com/generate_204', interval: 300}, filter: '^(?!.*(剩余|套餐|官网|群组|订阅|到期|永久|基础|国内|过滤|测试))'}
# 策略组类型模板 - 定义不同的策略组基础配置
BaseSL: &BaseSL {type: select, interval: 200, lazy: true, url: 'https://cp.cloudflare.com/generate_204', hidden: true}
BaseCH: &BaseCH {type: load-balance, interval: 200, lazy: true, url: 'https://cp.cloudflare.com/generate_204', hidden: true}
BaseCR: &BaseCR {type: load-balance, interval: 200, lazy: true, url: 'https://cp.cloudflare.com/generate_204', hidden: true}
BaseFB: &BaseFB {type: fallback, interval: 200, lazy: true, url: 'https://cp.cloudflare.com/generate_204', hidden: true}
BaseSM: &BaseSM {type: smart, interval: 200, lazy: true, url: 'https://cp.cloudflare.com/generate_204', hidden: true, uselightgbm: true}

# 节点筛选正则表达式 - 基于地理位置和关键词过滤
FilterHK: &FilterHK '(?i)^(?=.*(港|🇭🇰|HK|Hong|HKG)).*$'
FilterSG: &FilterSG '(?i)^(?=.*(坡|🇸🇬|SG|Sing|SIN|XSP)).*$'
FilterJP: &FilterJP '(?i)^(?=.*(日|🇯🇵|JP|Japan|NRT|HND|KIX|CTS|FUK)).*$'
FilterKR: &FilterKR '(?i)^(?=.*(韩|🇰🇷|韓|首尔|南朝鲜|KR|KOR|Korea|South)).*$'
FilterUS: &FilterUS '(?i)^(?=.*(美|🇺🇸|US|USA|SJC|JFK|LAX|ORD|ATL|DFW|SFO|MIA|SEA|IAD)).*$'
FilterTW: &FilterTW '(?i)^(?=.*(台|🇼🇸|🇹🇼|TW|tai|TPE|TSA|KHH)).*$'
FilterEU: &FilterEU '(?i)^(?=.*(奥|比|保|克罗地亚|塞|捷|丹|爱沙|英|加|UK|GB|CA|LHR|YVR|YYZ|MAD|BCN|FCO|MUC|BRU)).*$'
FilterOT: &FilterOT '(?i)^(?!.*(DIRECT|直接连接|美|港|坡|台|新|日|韩|奥|比|保|克罗地亚|塞|捷|丹|爱沙|芬|法|德|希|匈|爱尔|意|拉|立|卢|马耳他|荷|波|葡|罗|斯洛伐|斯洛文|西|瑞|英|加|🇭🇰|🇼🇸|🇹🇼|🇸🇬|🇯🇵|🇰🇷|🇺🇸|🇬🇧|🇦🇹|🇧🇪|🇨🇿|🇩🇰|🇫🇮|🇫🇷|🇩🇪|🇮🇪|🇮🇹|🇱🇹|🇱🇺|🇳🇱|🇵🇱|🇸🇪|🇨🇦|HK|TW|SG|JP|KR|US|GB|CA|CDG|FRA|AMS|MAD|BCN|FCO|MUC|BRU|HKG|TPE|TSA|KHH|SIN|XSP|NRT|HND|KIX|CTS|FUK|JFK|LAX|ORD|ATL|DFW|SFO|MIA|SEA|IAD|LHR|LGW|YVR|YYZ)).*$'
FilterAL: &FilterAL '(?i)^(?!.*(DIRECT|直接连接|群|邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|使用|提示|特别|访问|支持|教程|关注|更新|作者|加入|USE|USED|TOTAL|EXPIRE|EMAIL|RESET|REMAIN|Panel|Channel|Author|GB|TB)).*$'

# 策略组代理列表模板 - 预定义的代理节点优先级排序
SelectHK: &SelectHK {type: select, proxies: [香港故转, 台湾故转, 日本故转, 狮城故转, 美国故转, 韩国故转,欧洲故转, 其他故转, 全球智能, 全球手选]}
SelectUS: &SelectUS {type: select, proxies: [美国故转, 香港故转, 台湾故转, 日本故转, 狮城故转, 韩国故转,欧洲故转, 其他故转, 全球智能, 全球手选]}
SelectDC: &SelectDC {type: select, proxies: [DIRECT,香港故转, 台湾故转, 日本故转, 狮城故转]}
SelectRJ: &SelectRJ {type: select, proxies: [REJECT,香港故转, 台湾故转, 日本故转, 狮城故转]}

# ==================== 代理提供商 ====================
proxy-providers:
  # 优质订阅源
  AirPort1-猫猫云: {<<: *BaseProvider, url: 'maomamoyunaddr', override: {additional-prefix: '[优] '}}
  AirPort2-Candytally: {<<: *BaseProvider, url: 'candytallyaddr', override: {additional-prefix: '[优] '}}
  # 备用订阅源
  AirPort3-69云: {<<: *BaseProvider, url: 'cloudflareaddr', override: {additional-prefix: '[备] '}}
  AirPort4-魔戒: {<<: *BaseProvider, url: '69yunaddr', override: {additional-prefix: '[备] '}}
  # 自建订阅源
  AirPort5-REshare: {<<: *BaseProvider, url: 'selfaddr', override: {additional-prefix: '[自] '}}
  AirPort6-Oracle: {<<: *BaseProvider, url: 'oracleaddr', override: {additional-prefix: '[自] '}}

