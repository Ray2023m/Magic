  - {name: WhatsApp,  <<: *SelectUS}
  - {name: Facebook,  <<: *SelectUS}
  - {name: YouTube,  <<: *SelectHK}
  - {name: TikTok,  <<: *SelectHK}
  - {name: Netflix,  <<: *SelectUS}
  - {name: HBO,  <<: *SelectUS}
  - {name: Disney,  <<: *SelectUS}
  - {name: Amazon,  <<: *SelectUS}
  - {name: Crunchyroll,  <<: *SelectUS}
  - {name: Spotify, <<: *SelectHK}
  - {name: Nvidia, <<: *SelectUS}
  - {name: Steam, <<: *SelectHK}
  - {name: Games, <<: *SelectHK}
  - {name: Apple, <<: *SelectDC}
  - {name: Google, <<: *SelectUS}
  - {name: Microsoft, <<: *SelectDC}
